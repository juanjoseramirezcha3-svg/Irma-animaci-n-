<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Animación Pajarito</title>

<style>
  body {
    margin: 0;
    background: #e6e6e6;
    overflow: hidden;
  }

  .escena {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  /* Imagen base */
  .fondo {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* Pajarito animado */
  .pajarito {
    position: absolute;
    bottom: 380px; /* ajusta según tu imagen */
    right: 220px;  /* ajusta según tu imagen */
    width: 100px;

    animation: volar 4s ease-in-out infinite;
  }

  /* Animación */
  @keyframes volar {
    0% {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    100% {
      transform: translateY(-400px) scale(0.3);
      opacity: 0.8;
    }
  }
</style>

</head>
<body>

<div class="escena">

  <!-- Imagen completa -->
  <img src="fondo-snoopy.png-removebg-preview.png" class="fondo">

  <!-- Pajarito (puedes usar la misma imagen o una recortada) -->
  <img src="woodstock.png-removebg-preview.png" class="pajarito">

</div>

</body>
</html>
